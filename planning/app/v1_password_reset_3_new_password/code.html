<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- iPhone 14 Pro Frame Simulation -->
<main class="w-full max-w-[393px] min-h-screen bg-surface flex flex-col relative px-6 py-4 overflow-hidden shadow-2xl md:my-8 md:rounded-[3rem] md:border-[8px] md:border-on-surface">
<!-- Status Bar Simulation -->
<div class="flex justify-between items-center w-full pt-4 pb-2 px-4 mb-8">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Header / Logo Section -->
<header class="flex flex-col items-center justify-center mt-6 space-y-4">
<div class="flex flex-col items-center justify-center">
<div class="bg-secondary-container p-4 rounded-full mb-2">
<span class="material-symbols-outlined text-[64px] text-secondary" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="font-headline font-extrabold text-2xl tracking-tighter text-primary">StayRight</h1>
</div>
</header>
<!-- Main Content Section -->
<div class="mt-12 space-y-8 flex-grow">
<div class="text-center">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Set a new password</h2>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Create a strong password to secure your account.</p>
</div>
<div class="space-y-6">
<!-- New Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold tracking-widest text-on-surface-variant uppercase pl-1">New Password</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl group transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/10">
<input class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 font-body text-on-surface placeholder-outline-variant" placeholder="Enter new password" type="password" value="PremiumStay2024!"/>
<button class="pr-4 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Password Strength Bar - STRONG state -->
<div class="mt-3 space-y-2 px-1">
<div class="flex justify-between items-center">
<span class="text-[10px] font-bold tracking-wider text-secondary uppercase">Strong password</span>
<span class="material-symbols-outlined text-secondary text-[16px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex gap-1 h-1.5 w-full">
<div class="flex-1 rounded-full bg-secondary"></div>
<div class="flex-1 rounded-full bg-secondary"></div>
<div class="flex-1 rounded-full bg-secondary"></div>
<div class="flex-1 rounded-full bg-secondary"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold tracking-widest text-on-surface-variant uppercase pl-1">Confirm Password</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl group transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/10">
<input class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 font-body text-on-surface placeholder-outline-variant" placeholder="Confirm new password" type="password" value="PremiumStay2024!"/>
<button class="pr-4 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer / CTA -->
<footer class="mt-auto pb-10 flex flex-col items-center">
<button class="w-full bg-botanical-gradient text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Update password</span>
<span class="material-symbols-outlined text-sm">lock_reset</span>
</button>
<button class="mt-6 text-primary font-bold text-sm hover:opacity-80 transition-opacity">
                Back to Sign In
            </button>
<!-- Home Indicator Simulation -->
<div class="mt-12 h-1.5 w-32 bg-on-surface/10 rounded-full"></div>
</footer>
</main>
