<!DOCTYPE html>

<html lang="en"><head>
<title>[v5] Log New Trip</title>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#92d5b2",
                        "on-surface-variant": "#404943",
                        "on-secondary-container": "#11704f",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f4f5",
                        "background": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "error": "#ba1a1a",
                        "tertiary": "#521c1b",
                        "primary": "#006948",
                        "on-primary-fixed-variant": "#045137",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#7ec09e",
                        "primary-fixed": "#adf1cd",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "error-container": "#ffdad6",
                        "primary-container": "#006948",
                        "secondary-container": "#9cf1c7",
                        "on-background": "#191c1d",
                        "inverse-primary": "#92d5b2",
                        "tertiary-fixed": "#ffdad7",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed-variant": "#713431",
                        "on-tertiary-container": "#ef9c96",
                        "on-secondary-fixed-variant": "#005237",
                        "surface-container": "#edeeef",
                        "inverse-surface": "#2e3132",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#6e322f",
                        "surface-tint": "#006948",
                        "secondary-fixed-dim": "#83d7ae",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "on-primary-fixed": "#002114",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#3a0a0a",
                        "inverse-on-surface": "#f0f1f2",
                        "outline": "#707973",
                        "outline-variant": "#bfc9c1",
                        "secondary": "#006948",
                        "secondary-fixed": "#9ff4ca"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .botanical-gradient {
            background: linear-gradient(180deg, #006948 0%, #004f35 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top AppBar -->
<header class="bg-surface flex justify-between items-center w-full px-6 py-6 sticky top-0 z-50">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-xl text-primary">Log New Trip</h1>
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center border-2 border-orange-200 overflow-hidden shadow-sm">
<!-- Warm/orange circular avatar placeholder -->
<span class="material-symbols-outlined text-orange-500 text-2xl" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</div>
</header>
<main class="flex-1 px-6 pb-32 max-w-2xl mx-auto w-full">
<!-- Step Indicator -->
<section class="flex justify-between items-center py-8 mb-4">
<!-- Step 1 -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-[#006948]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#006948]" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="font-label text-[10px] font-bold tracking-wider uppercase text-[#006948]">Destination</span>
</div>
<div class="flex-1 h-[2px] bg-surface-container-highest mx-4 mb-6"></div>
<!-- Step 2 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-[#006948] flex items-center justify-center ring-4 ring-[#006948]/20">
<span class="text-on-primary font-headline font-bold">2</span>
</div>
<span class="font-label text-[10px] font-bold tracking-wider uppercase text-[#006948]">Dates</span>
</div>
<div class="flex-1 h-[2px] bg-surface-container-highest mx-4 mb-6"></div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="text-on-surface-variant font-headline font-bold">3</span>
</div>
<span class="font-label text-[10px] font-bold tracking-wider uppercase text-on-surface-variant">Confirm</span>
</div>
</section>
<!-- Date Inputs Container -->
<div class="space-y-8">
<!-- Departure Date -->
<div class="space-y-3">
<label class="font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">DEPARTURE DATE</label>
<div class="relative group">
<div class="w-full bg-surface-container-low px-5 py-4 rounded-xl flex justify-between items-center group-focus-within:ring-2 ring-[#006948]/40 transition-all border border-transparent">
<span class="font-body font-semibold text-on-surface">Thursday, 2 April 2026</span>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
<div class="flex justify-end items-center gap-3 pr-1">
<span class="font-body text-sm text-on-surface-variant">I'm leaving today</span>
<button class="w-12 h-6 bg-surface-container-high rounded-full relative transition-colors p-1">
<div class="w-4 h-4 bg-white rounded-full shadow-sm"></div>
</button>
</div>
</div>
<!-- Return Date -->
<div class="space-y-3">
<label class="font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">RETURN DATE</label>
<div class="relative group">
<div class="w-full bg-surface-container-low px-5 py-4 rounded-xl flex justify-between items-center group-focus-within:ring-2 ring-[#006948]/40 transition-all border border-transparent">
<span class="font-body font-semibold text-on-surface">Thursday, 9 April 2026</span>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
<div class="flex justify-start ml-1">
<button class="font-body text-sm font-semibold text-[#006948] hover:underline transition-all">I'll log my return later</button>
</div>
</div>
<!-- Live Calculation Panel -->
<article class="bg-surface-container-low rounded-2xl p-6 mt-12 space-y-6">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="font-headline text-2xl font-bold text-on-background">This trip: 7 days</h3>
<p class="font-body text-md font-semibold text-[#006948]">131 days remaining</p>
</div>
<div class="bg-[#006948]/10 px-4 py-1.5 rounded-full">
<span class="font-label text-[10px] font-extrabold tracking-widest text-[#006948] uppercase">SAFE TO TRAVEL</span>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">ROLLING WINDOW AFTER THIS TRIP</label>
<span class="font-headline text-sm font-bold text-on-background">49 / 180 DAYS</span>
</div>
<div class="w-full h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-[#006948] w-[27%] rounded-full"></div>
</div>
</div>
</article>
</div>
</main>
<!-- Bottom Action Buttons -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md px-6 pb-10 pt-4 flex gap-4 max-w-2xl mx-auto left-1/2 -translate-x-1/2">
<button class="flex-1 bg-surface-container-high text-[#006948] font-headline font-bold py-4 rounded-full hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">arrow_back</span>
            Back
        </button>
<button class="flex-[1.5] bg-[#006948] text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-[#006948]/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</footer>
<!-- Visual Polish: Decorative Tonal Elements -->
<div class="fixed top-24 -right-16 w-64 h-64 bg-[#006948]/5 blur-3xl rounded-full -z-10"></div>
<div class="fixed bottom-32 -left-16 w-48 h-48 bg-[#006948]/5 blur-3xl rounded-full -z-10"></div>
</body></html>
