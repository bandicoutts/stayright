<div class="flex items-center gap-2 text-xl font-extrabold text-[#003623] font-['Manrope'] tracking-tight">
<span class="material-symbols-outlined text-[#006948]" data-icon="shield">shield</span>

</div>

<div class="flex gap-2 mb-16">
<div class="w-2.5 h-2.5 rounded-full bg-[#006948]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant"></div>

</div>

</div>

<div class="max-w-xs space-y-4">

<p class="font-body text-on-surface-variant leading-relaxed px-2">

</div>

<div class="w-48 h-64 bg-surface-container-low rounded-xl transform -rotate-3 absolute -z-10 opacity-50"></div>

<div class="p-4 flex flex-col items-start gap-3">
<div class="h-2 w-12 bg-secondary-container rounded-full"></div>
<div class="h-4 w-full bg-surface-container-high rounded-lg"></div>

</div>
</div>

            Skip setup
        </button>
<button class="botanical-gradient w-full py-4 rounded-full text-white font-headline font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
