<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Visa Setup - StayRight</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#003623",
              "on-primary-container": "#7ec09e",
              "secondary-fixed-dim": "#83d7ae",
              "on-tertiary-fixed-variant": "#713431",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "on-background": "#191c1d",
              "primary-container": "#004f35",
              "inverse-primary": "#92d5b2",
              "error": "#ba1a1a",
              "outline": "#707973",
              "background": "#f8f9fa",
              "surface-tint": "#276a4e",
              "surface-bright": "#f8f9fa",
              "secondary-fixed": "#9ff4ca",
              "tertiary-fixed": "#ffdad7",
              "on-primary-fixed": "#002114",
              "tertiary": "#521c1b",
              "on-secondary-fixed-variant": "#005237",
              "inverse-on-surface": "#f0f1f2",
              "surface-container-highest": "#e1e3e4",
              "surface-variant": "#e1e3e4",
              "primary-fixed": "#adf1cd",
              "surface-container-high": "#e7e8e9",
              "tertiary-container": "#6e322f",
              "on-tertiary-fixed": "#3a0a0a",
              "surface-container": "#edeeef",
              "secondary-container": "#9cf1c7",
              "surface-container-low": "#f3f4f5",
              "secondary": "#076c4b",
              "outline-variant": "#bfc9c1",
              "on-primary-fixed-variant": "#045137",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#11704f",
              "inverse-surface": "#2e3132",
              "tertiary-fixed-dim": "#ffb3ae",
              "surface": "#f8f9fa",
              "primary-fixed-dim": "#92d5b2",
              "on-tertiary-container": "#ef9c96",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#191c1d",
              "on-secondary-fixed": "#002114",
              "surface-dim": "#d9dadb",
              "on-surface-variant": "#404943",
              "on-error-container": "#93000a",
              "on-secondary": "#ffffff",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
      }
      h1, h2, h3 {
        font-family: 'Manrope', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar: small_center_aligned -->
<header class="bg-[#f8f9fa] flex justify-center items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="flex items-center gap-2 text-xl font-extrabold text-[#003623] font-['Manrope'] tracking-tight">
<span class="material-symbols-outlined text-[#006948]" data-icon="shield">shield</span>
<span class="text-primary">StayRight</span>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-md mx-auto w-full">
<!-- Progress Dots -->
<div class="flex justify-center gap-2 mb-8">
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
<div class="w-2 h-2 rounded-full bg-[#006948]"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
</div>
<!-- Header Section -->
<div class="mb-8">
<span class="text-[0.75rem] font-medium tracking-[0.05rem] text-[#3D4A42] font-label uppercase">STEP 1 OF 2</span>
<h1 class="text-[1.75rem] font-bold leading-tight mt-1 text-on-background">Tell us about your visa</h1>
</div>
<!-- Input Stack -->
<div class="space-y-3">
<!-- Visa Route -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col transition-all active:scale-95 duration-150">
<label class="text-[0.75rem] font-medium text-on-surface-variant mb-1 font-label">Visa route</label>
<div class="flex justify-between items-center">
<span class="text-on-surface font-medium">Skilled Worker</span>
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Start Date -->
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col transition-all active:scale-95 duration-150">
<label class="text-[0.75rem] font-medium text-on-surface-variant mb-1 font-label">Visa start date</label>
<div class="flex justify-between items-center">
<span class="text-on-surface font-medium">14 January 2023</span>
<span class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Entry Date -->
<div class="space-y-2">
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col transition-all active:scale-95 duration-150">
<label class="text-[0.75rem] font-medium text-on-surface-variant mb-1 font-label">UK entry date</label>
<div class="flex justify-between items-center">
<span class="text-on-surface font-medium">14 January 2023</span>
<span class="material-symbols-outlined text-outline" data-icon="event_available">event_available</span>
</div>
</div>
<p class="text-[0.75rem] text-[#3D4A42] font-label px-1">This is the date you first entered the UK on this visa.</p>
</div>
</div>
<!-- Result Card -->
<div class="mt-8 bg-surface-container-low rounded-xl p-4 flex items-center gap-4">
<div class="bg-secondary-container/30 p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="text-on-surface">
<span class="block text-sm">ILR eligibility:</span>
<span class="text-[#006948] font-bold">14 January 2028</span>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pt-10">
<div class="max-w-md mx-auto flex flex-col gap-4">
<button class="text-primary font-medium text-sm text-center py-2 transition-opacity hover:opacity-80 active:scale-95 duration-150">
                ← Back
            </button>
<button class="w-full bg-gradient-to-b from-secondary to-primary text-white font-bold py-4 rounded-full flex justify-center items-center gap-2 shadow-[0px_12px_32px_rgba(0,79,53,0.06)] active:scale-95 transition-transform">
                Continue
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</body></html>
