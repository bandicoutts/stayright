<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to StayRight</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#006948",
              "surface-tint": "#076c4b",
              "on-tertiary-fixed": "#410002",
              "on-tertiary-fixed-variant": "#930009",
              "on-primary-fixed": "#002114",
              "on-surface": "#191c1d",
              "surface-bright": "#f8f9fa",
              "tertiary": "#8e0009",
              "inverse-surface": "#2e3132",
              "secondary-fixed": "#ffdcc3",
              "error": "#ba1a1a",
              "outline": "#6f7a72",
              "surface-dim": "#d9dadb",
              "surface-variant": "#e1e3e4",
              "secondary-container": "#fe932c",
              "primary": "#004f35",
              "on-secondary-fixed": "#2f1500",
              "tertiary-fixed-dim": "#ffb4ab",
              "secondary-fixed-dim": "#ffb77d",
              "surface-container": "#edeeef",
              "on-error": "#ffffff",
              "surface-container-low": "#f3f4f5",
              "primary-fixed-dim": "#83d7ae",
              "on-tertiary-container": "#ffc7c0",
              "on-surface-variant": "#3f4943",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "inverse-primary": "#83d7ae",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#005237",
              "surface-container-high": "#e7e8e9",
              "tertiary-fixed": "#ffdad5",
              "background": "#f8f9fa",
              "tertiary-container": "#b61618",
              "secondary": "#904d00",
              "surface-container-lowest": "#ffffff",
              "on-background": "#191c1d",
              "on-secondary-fixed-variant": "#6e3900",
              "on-error-container": "#93000a",
              "primary-fixed": "#9ff4ca",
              "on-primary-container": "#91e5bc",
              "inverse-on-surface": "#f0f1f2",
              "outline-variant": "#bec9c1",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "on-secondary-container": "#663500"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-editorial-gradient {
            background: linear-gradient(145deg, #004f35 0%, #006948 100%);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Brand Identity Header -->
<div class="flex flex-col items-center mb-8">
<!-- Logo -->
<div class="flex items-center gap-2 mb-6">
<div class="bg-primary-container p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<span class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">StayRight</span>
</div>
<!-- Progress Indicator -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
</div>
<!-- Onboarding Card -->
<main class="w-full max-w-[560px] bg-surface-container-lowest rounded-xl p-10 flex flex-col items-center text-center">
<!-- Visual Anchor -->
<div class="mb-8 w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary-container" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<!-- Typography Cluster -->
<div class="space-y-4 mb-10">
<h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight">
                Welcome to StayRight
            </h1>
<p class="font-body text-on-surface-variant max-w-[360px] mx-auto leading-relaxed">
                Let's set up your profile so we can track your ILR journey accurately.
            </p>
</div>
<!-- Interaction Cluster -->
<div class="w-full space-y-6">
<button class="w-full bg-editorial-gradient text-white font-body font-semibold py-4 px-8 rounded-full flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-[0.98]">
                Let's go
                <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="font-body text-sm font-medium text-on-surface-variant hover:text-primary transition-colors">
                Skip setup
            </button>
</div>
</main>
<!-- Content Decorative Background (Tonal) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-primary-container/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
