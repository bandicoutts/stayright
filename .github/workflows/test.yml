name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start local Supabase
        run: npx supabase start --ignore-health-check

      - name: Get local Supabase status
        id: supabase_keys
        run: |
          echo "Waiting for Supabase API to respond..."
          for i in {1..60}; do
            if curl -s -f "http://127.0.0.1:54321/auth/v1/health" > /dev/null; then
              echo "Supabase API is UP"
              
              STATUS_JSON=$(npx supabase status -o json)
              ANON=$(echo $STATUS_JSON | jq -r '.anon_key')
              SERVICE=$(echo $STATUS_JSON | jq -r '.service_role_key')
              
              # CREATE ENV FILE DIRECTLY - This is the most robust way to pass vars to Next.js Client Components in CI
              echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> .env.local
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON" >> .env.local
              echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE" >> .env.local
              echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
              
              echo "Generated .env.local for CI:"
              cat .env.local | sed 's/KEY=.*/KEY=***'/g
              
              echo "url=http://127.0.0.1:54321" >> $GITHUB_OUTPUT
              echo "anon_key=$ANON" >> $GITHUB_OUTPUT
              echo "service_role_key=$SERVICE" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Supabase timed out."
          npx supabase status --debug
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase_keys.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase_keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase_keys.outputs.service_role_key }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_dummy' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_dummy' }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY || 'price_ci_monthly' }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL || 'price_ci_annual' }}
          STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME || 'price_ci_lifetime' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_dummy' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'cron_ci_dummy' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'testuser@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
