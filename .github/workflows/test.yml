name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: npx supabase start

      - name: Extract Supabase Keys and Generate .env.local
        id: supabase_keys
        run: |
          echo "Waiting for Supabase API to respond..."
          for i in {1..60}; do
            if curl -s -f "http://127.0.0.1:54321/auth/v1/health" > /dev/null; then
              echo "Supabase API is UP"
              
              STATUS_TEXT=$(npx supabase status 2>&1)

              # CLI v2: keys are sb_publishable_* / sb_secret_*
              ANON=$(echo "$STATUS_TEXT" | grep -oP 'sb_publishable_\S+' | head -1)
              SERVICE=$(echo "$STATUS_TEXT" | grep -oP 'sb_secret_\S+' | head -1)

              # CLI v1 fallback: keys are JWTs starting with eyJ
              if [[ -z "$ANON" ]]; then
                ANON=$(echo "$STATUS_TEXT" | grep -oP '(?<=anon key: )eyJ\S+' | head -1)
              fi
              if [[ -z "$SERVICE" ]]; then
                SERVICE=$(echo "$STATUS_TEXT" | grep -oP '(?<=service_role key: )eyJ\S+' | head -1)
              fi

              if [[ -z "$ANON" || -z "$SERVICE" ]]; then
                echo "❌ Failed to extract Supabase keys"
                echo "Status output:"
                echo "$STATUS_TEXT"
                exit 1
              fi
              echo "✓ Keys extracted (anon: ${#ANON} chars, service: ${#SERVICE} chars)"

              # CREATE ENV FILE DIRECTLY - This is the most robust way to pass vars to Next.js Client Components in CI
              echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> .env.local
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON" >> .env.local
              echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE" >> .env.local
              echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
              echo "TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL || 'testuser@example.com' }}" >> .env.local
              echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}" >> .env.local
              
              echo "url=http://127.0.0.1:54321" >> $GITHUB_OUTPUT
              echo "anon_key=$ANON" >> $GITHUB_OUTPUT
              echo "service_role_key=$SERVICE" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Supabase timed out."
          npx supabase status --debug
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create Test User
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'testuser@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}
        run: npm run test:create-user

      - name: Build Next.js app
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_dummy' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_dummy' }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY || 'price_ci_monthly' }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL || 'price_ci_annual' }}
          STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME || 'price_ci_lifetime' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_dummy' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'cron_ci_dummy' }}
        run: npm run build

      - name: Run Playwright Tests
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_dummy' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_dummy' }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY || 'price_ci_monthly' }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL || 'price_ci_annual' }}
          STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME || 'price_ci_lifetime' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_dummy' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'cron_ci_dummy' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'testuser@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
