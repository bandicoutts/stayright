name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start local Supabase
        run: npx supabase start --ignore-health-check

      - name: Get local Supabase status
        id: supabase_keys
        run: |
          echo "Waiting 10s for services to stabilize..."
          sleep 10
          docker ps
          
          # Wait up to 120s for services to be ready
          for i in {1..40}; do
            STATUS_ENV=$(npx supabase status -o env || echo "")
            STATUS_JSON=$(npx supabase status -o json || echo "{}")
            STATUS_TEXT=$(npx supabase status || echo "")
            
            echo "--- Attempt $i ---"
            
            URL=$(echo "$STATUS_ENV" | grep "API_URL" | sed 's/.*=//' | xargs || echo "")
            if [ -z "$URL" ]; then
              URL=$(echo $STATUS_JSON | jq -r '.api_url // empty')
            fi
            
            if [ ! -z "$URL" ] && [ "$URL" != "null" ]; then
              # Perform a real health check on the API Gateway
              if curl -s -f "$URL/auth/v1/health" > /dev/null; then
                ANON=$(echo "$STATUS_ENV" | grep "ANON_KEY" | sed 's/.*=//' | xargs || echo "")
                if [ -z "$ANON" ]; then ANON=$(echo $STATUS_JSON | jq -r '.anon_key // empty'); fi
                
                SERVICE=$(echo "$STATUS_ENV" | grep "SERVICE_ROLE_KEY" | sed 's/.*=//' | xargs || echo "")
                if [ -z "$SERVICE" ]; then SERVICE=$(echo $STATUS_JSON | jq -r '.service_role_key // empty'); fi
                
              # Force localhost instead of 127.0.0.1 to avoid browser/CORS issues in CI
              URL=$(echo "$URL" | sed 's/127\.0\.0\.1/localhost/')
              
              echo "url=$URL" >> $GITHUB_OUTPUT
              echo "anon_key=$ANON" >> $GITHUB_OUTPUT
              echo "service_role_key=$SERVICE" >> $GITHUB_OUTPUT
              echo "Supabase fully ready and responding at $URL"
              exit 0
              else
                echo "Supabase CLI says running, but $URL/auth/v1/health is not responding yet..."
              fi
            fi
            
            echo "Waiting for Supabase... ($i)"
            sleep 3
          done
          echo "Supabase timed out. Final debug:"
          npx supabase status --debug
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase_keys.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase_keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase_keys.outputs.service_role_key }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_dummy' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_dummy' }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY || 'price_ci_monthly' }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL || 'price_ci_annual' }}
          STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME || 'price_ci_lifetime' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_dummy' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'cron_ci_dummy' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL || 'testuser@example.com' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
