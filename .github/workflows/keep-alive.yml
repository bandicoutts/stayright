name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
    - cron: '0 8 * * 4'   # Thursday 08:00 UTC
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase (keep free tier alive)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 15 \
            --header "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/trips?select=id&limit=1")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: ping returned non-2xx status $HTTP_STATUS"
            exit 1
          fi
