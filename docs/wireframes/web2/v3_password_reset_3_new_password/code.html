<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set New Password | StayRight</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f3f4f5",
              "on-primary-fixed": "#002114",
              "on-tertiary-fixed-variant": "#930009",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#005237",
              "surface-container-high": "#e7e8e9",
              "on-tertiary-fixed": "#410002",
              "tertiary-fixed": "#ffdad5",
              "inverse-primary": "#83d7ae",
              "secondary-fixed-dim": "#ffb77d",
              "on-surface": "#191c1d",
              "primary": "#004f35",
              "on-primary-container": "#91e5bc",
              "outline-variant": "#bec9c1",
              "secondary": "#904d00",
              "on-secondary-fixed": "#2f1500",
              "surface-tint": "#076c4b",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb4ab",
              "surface-dim": "#d9dadb",
              "on-secondary-fixed-variant": "#6e3900",
              "secondary-container": "#fe932c",
              "error": "#ba1a1a",
              "tertiary": "#8e0009",
              "surface": "#f8f9fa",
              "surface-container": "#edeeef",
              "surface-container-highest": "#e1e3e4",
              "on-background": "#191c1d",
              "inverse-surface": "#2e3132",
              "tertiary-container": "#b61618",
              "surface-variant": "#e1e3e4",
              "on-secondary": "#ffffff",
              "primary-fixed": "#9ff4ca",
              "on-tertiary-container": "#ffc7c0",
              "secondary-fixed": "#ffdcc3",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "surface-bright": "#f8f9fa",
              "primary-fixed-dim": "#83d7ae",
              "primary-container": "#006948",
              "background": "#f8f9fa",
              "outline": "#6f7a72",
              "on-secondary-container": "#663500",
              "on-surface-variant": "#3f4943",
              "on-error": "#ffffff",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(145deg, #004f35 0%, #006948 100%);
        }
        .botanical-shadow {
            box-shadow: 0px 12px 32px rgba(0, 33, 20, 0.06);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Brand Identity Anchor -->
<div class="mb-10 text-center">
<h1 class="font-headline font-bold text-3xl tracking-tighter text-primary">StayRight</h1>
</div>
<!-- Main Content Canvas: Centered Card -->
<main class="w-full max-w-[480px]">
<div class="bg-surface-container-lowest rounded-xl p-10 botanical-shadow border border-outline-variant/10">
<!-- Icon & Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="shield">shield</span>
</div>
<h2 class="font-headline font-bold text-2xl tracking-tight text-on-surface text-center">Set a new password</h2>
<p class="text-on-surface-variant text-sm mt-2 text-center max-w-[320px]">Choose a strong, unique password to keep your account secure.</p>
</div>
<!-- Form Content -->
<form class="space-y-6">
<!-- New Password Field -->
<div class="space-y-2">
<label class="font-label text-[0.75rem] font-semibold tracking-widest text-on-surface-variant uppercase pl-1">
                        NEW PASSWORD
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline-variant transition-all" placeholder="••••••••••••" type="password" value="••••••••••••"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="pt-2 px-1">
<div class="flex justify-between items-center mb-1.5">
<span class="text-[0.6875rem] font-bold text-primary tracking-wide">STRONG PASSWORD</span>
<span class="text-[0.6875rem] text-on-surface-variant">12/12 characters</span>
</div>
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-full bg-primary rounded-full transition-all duration-500"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label text-[0.75rem] font-semibold tracking-widest text-on-surface-variant uppercase pl-1">
                        CONFIRM PASSWORD
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline-variant transition-all" placeholder="••••••••••••" type="password" value="••••••••••••"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-primary-gradient text-on-primary font-headline font-bold rounded-full botanical-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Update password
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<a class="inline-flex items-center text-on-surface-variant hover:text-primary text-sm font-medium transition-colors gap-2" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="keyboard_backspace">keyboard_backspace</span>
                    Back to login
                </a>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="mt-12 w-full max-w-7xl mx-auto flex flex-col md:flex-row justify-center items-center gap-6 py-8">
<span class="font-label text-[0.75rem] tracking-widest uppercase text-slate-400">© 2024 StayRight Editorial Concierge</span>
<div class="flex gap-6">
<a class="font-label text-[0.75rem] tracking-widest uppercase text-slate-400 hover:text-emerald-600 transition-opacity opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-label text-[0.75rem] tracking-widest uppercase text-slate-400 hover:text-emerald-600 transition-opacity opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-label text-[0.75rem] tracking-widest uppercase text-slate-400 hover:text-emerald-600 transition-opacity opacity-80 hover:opacity-100" href="#">Contact Support</a>
</div>
</footer>
</body></html>
