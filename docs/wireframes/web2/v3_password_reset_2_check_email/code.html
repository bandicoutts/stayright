<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StayRight — Check Your Inbox</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f3f4f5",
              "on-primary-fixed": "#002114",
              "on-tertiary-fixed-variant": "#930009",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#005237",
              "surface-container-high": "#e7e8e9",
              "on-tertiary-fixed": "#410002",
              "tertiary-fixed": "#ffdad5",
              "inverse-primary": "#83d7ae",
              "secondary-fixed-dim": "#ffb77d",
              "on-surface": "#191c1d",
              "primary": "#004f35",
              "on-primary-container": "#91e5bc",
              "outline-variant": "#bec9c1",
              "secondary": "#904d00",
              "on-secondary-fixed": "#2f1500",
              "surface-tint": "#076c4b",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb4ab",
              "surface-dim": "#d9dadb",
              "on-secondary-fixed-variant": "#6e3900",
              "secondary-container": "#fe932c",
              "error": "#ba1a1a",
              "tertiary": "#8e0009",
              "surface": "#f8f9fa",
              "surface-container": "#edeeef",
              "surface-container-highest": "#e1e3e4",
              "on-background": "#191c1d",
              "inverse-surface": "#2e3132",
              "tertiary-container": "#b61618",
              "surface-variant": "#e1e3e4",
              "on-secondary": "#ffffff",
              "primary-fixed": "#9ff4ca",
              "on-tertiary-container": "#ffc7c0",
              "secondary-fixed": "#ffdcc3",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "surface-bright": "#f8f9fa",
              "primary-fixed-dim": "#83d7ae",
              "primary-container": "#006948",
              "background": "#f8f9fa",
              "outline": "#6f7a72",
              "on-secondary-container": "#663500",
              "on-surface-variant": "#3f4943",
              "on-error": "#ffffff",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .botanical-shadow {
            box-shadow: 0px 12px 32px rgba(0, 33, 20, 0.06);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- Header Section -->
<header class="w-full py-12 flex justify-center">
<div class="flex items-center gap-2">
<span class="font-headline font-bold text-3xl text-primary tracking-tighter">StayRight</span>
</div>
</header>
<main class="flex-grow flex items-start justify-center px-6">
<!-- Auth Card Container -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl botanical-shadow p-10 flex flex-col items-center text-center">
<!-- Centered Icon -->
<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">mail</span>
</div>
<!-- Content Area -->
<div class="space-y-4 mb-10">
<h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Check your inbox</h1>
<p class="font-body text-on-surface-variant leading-relaxed text-base">
                    We've sent a password reset link to <span class="text-primary font-semibold">david@example.com</span>. It expires in 24 hours.
                </p>
</div>
<!-- Actions Stack -->
<div class="w-full flex flex-col gap-6">
<!-- Open Gmail Button -->
<button class="w-full py-4 px-6 rounded-full bg-surface-container-high text-primary font-semibold text-base transition-colors hover:bg-surface-container-highest flex items-center justify-center gap-2">
                    Open Gmail
                </button>
<!-- Resend Link -->
<div class="text-sm font-medium">
<span class="text-on-surface-variant">Didn't receive it?</span>
<button class="text-primary hover:text-primary-container ml-1 transition-colors font-semibold">Resend</button>
</div>
</div>
<!-- Footer Navigation -->
<div class="mt-12 pt-8 border-t border-surface-container-high w-full">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors font-medium" href="#">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
</main>
<!-- Footer Segment -->
<footer class="flex flex-col md:flex-row justify-center items-center gap-6 w-full py-8 bg-transparent">
<div class="font-['Inter'] text-[0.75rem] tracking-widest uppercase text-slate-400 dark:text-slate-500 opacity-80 hover:opacity-100 transition-opacity">
            © 2024 StayRight Editorial Concierge
        </div>
<div class="flex gap-6">
<a class="font-['Inter'] text-[0.75rem] tracking-widest uppercase text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-300 transition-opacity opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-[0.75rem] tracking-widest uppercase text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-300 transition-opacity opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-['Inter'] text-[0.75rem] tracking-widest uppercase text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-300 transition-opacity opacity-80 hover:opacity-100" href="#">Contact Support</a>
</div>
</footer>
</body></html>
